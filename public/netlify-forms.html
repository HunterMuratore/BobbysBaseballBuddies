<!DOCTYPE html>
<html>
  <head><title>Netlify Form Detection</title></head>
  <body>
    <!-- Hidden form for Netlify to detect at build time -->
    <form name="email-signup" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="hidden" name="bot-field" />
    </form>
  </body>
</html>
